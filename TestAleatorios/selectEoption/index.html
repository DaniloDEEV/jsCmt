<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tewino de option</title>
    <style>
        label{
            background-color: blue;
        }
    </style>
</head>
<body>

    <select name="" id="">
       <option value="v1">Selecione a opçao</option>

       <optgroup  label="frutas" >
       <option value="v2">banana</option>
       <option value="v3">limao</option>
       <option value="v4">abacaxi</option>
      </optgroup>

      <optgroup label="comidas">
        <option value="v5">arroz</option>
        <option value="v6">feijao</option>
        <option value="v7">carne</option>
      </optgroup>
    </select>


</body>
</html>
