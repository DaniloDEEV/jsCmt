<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Desafio: Números Iguais ou Diferentes</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 50px;
      background: #f0f0f0;
    }
    h2 {
      color: #333;
    }
    input {
      margin: 10px;
      padding: 8px;
      width: 150px;
      font-size: 16px;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
    }
    p#res {
      margin-top: 20px;
      font-weight: bold;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <h2>🧩 Desafio: Números Iguais ou Diferentes</h2>
  <p>Digite dois números e descubra se eles são iguais ou diferentes!</p>
  
  <input type="number" id="num1" placeholder="Primeiro número">
  
  <input type="number" id="num2" placeholder="Segundo número">
  <button onclick="verificar()">Verificar</button>
  
  <p id="res"></p>

  <script src="script.js"></script>
</body>
</html>
