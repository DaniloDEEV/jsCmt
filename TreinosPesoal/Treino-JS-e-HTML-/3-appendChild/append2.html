<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>appendChild</title>
</head>
<body>
    
    <input type="button"value="colocar" onclick="clicar()">

    <input type="text" placeholder="nomes" id="nome">

    
    <p id="p">carregando ...</p>
<script>
   
  function clicar() {

  p.textContent = ""
  var texto = document.createTextNode(nome.value)
  p.appendChild(texto)
}

    
</script>
</body>
</html>
