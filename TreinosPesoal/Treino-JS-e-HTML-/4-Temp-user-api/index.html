<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap">

    <link rel="stylesheet" href="style.css">

    <title>Presão do tempo</title>


</head>

<body>

    <div class="caixa-maior">
        <input type="text" class="input-cidade" placeholder="Digite o nome da cidade">
        <button class="botao-busca"  onclick="cliqueiNoBotao()">
            <img class="img-busca"
                src="https://media.istockphoto.com/id/1478642918/pt/vetorial/magnifying-glass-cartoon-icon-vector-illustration-flat-illustration-of-cute-magnifying.jpg?s=612x612&w=0&k=20&c=apYi4xtMb2sEa4pQl3QsrldTRp-d_UFZ124sWlL_M5M="
                alt="">
        </button>
        <div class="caixa-media"></div>
        <h2 class="cidade">Cidades</h2>
        <p class="temp">21°C</p>
        <div class="caixa-menor">
            <img class="img-previsao" src="https://openweathermap.org/img/wn/02d.png">
            <p class="texto-previsao">Nublado</p>
        </div>
        <p class="umidade">Umidade: 76%</p>
    </div>
    </div>

<script src="script.js" defer></script>
</body>

</html>
