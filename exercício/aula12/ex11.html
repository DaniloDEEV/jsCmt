<body>
     <header>
     <h1>Bem vindo </h1>
     <h2>siste onde voce irá saber se vai vota em <strong>2025</strong></h2>
    </header>
    <section>
    <p>aqui abaixo onde voce irá saber se vai vota</p>
    <input type="number" name="" id="idade">
    <input type="button" value="pesquisar" id="pesq" onclick="clicar()">
    <p id="res"></p>

    </section>

    <script>
    function clicar (){
    var idade = Number(document.getElementById("idade").value)
    var pesq = document.getElementById("pesq")
    var res = document.getElementById("res")
    

    if (idade <= 17 && idade >= 16){res.innerHTML = "você pode escolher. vota o não vota"}
    else if(idade >= 18 && idade <= 70){
        res.innerHTML = "A participação na <strong>votação</strong> é obrigatória para esta faixa etária."}
    else if (idade <= 15) {res.innerHTML = "No momento, você ainda não está apto a votar. A participação será permitida a partir dos <strong>18 anos de idade</strong>."}
    else {res.innerHTML = "O voto <strong>não é obrigatório</strong>."}
   

    }
 
        




    </script>
