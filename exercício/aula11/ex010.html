<body>
    <h1>Sistema de mutas</h1>
    Velocidade do carro<input type="number" name="txtvel" id="txtvel">km/h
    <input type="button" value="Verificar" onclick="calcular()">
<div id="res"></div>




<script> 
     function calcular () {
     var txtv = document.getElementById("txtvel")
     res = document.querySelector("div#res")
     var val = Number(txtv.value)
     res.innerHTML = `sua velocidade atual e de <strong>${val} km/h </strong>`
     res.innerHTML += `<br> dirija sempre com cinto de segurança`
   
     if (val > 60){
        res.innerHTML += ("Voce esta multado por exesso de velocidade")
     }                                     
     }
</script>
</body>
