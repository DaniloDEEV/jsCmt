<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

<style>
div#area{
    font: normal 20pt arial ;
    background-color: rgb(21, 199, 21);
    height: 200px;
    width: 200px;
    line-height:200px;
    text-align: center;
}

</style>

</head>
<body>
    
<div id="area" onclick="Clicar()" onmouseenter="entra()" onmouseout="sair()" >interaja...</div>



<script>

var a = window.document.getElementById("area")
// a.addEventListener('click', Clicar)
// a.addEventListener("mouseenter", entra)
// a.addEventListener("mouseout", sair)
// Dar para usar EventListener para tira os elemento do html

    function Clicar(){
     a.innerText = "clicou"   
     a.style.background = "yellow"
    }

    function entra(){
        a.innerText = "entro"
        a.style.background = "green"
    }

    function sair(){
        a.innerText = "saiu"
        a.style.background = "blue"
    }
</script>
</body>



</html>
